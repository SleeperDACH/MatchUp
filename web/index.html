<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tippspiel & Fantasy mit Freunden.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MatchUp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MatchUp</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Dunkler Startbildschirm mit Logo statt weißem Flackern, bis Flutter das
    erste Frame gerendert hat. Nur Logo, kein Text.
  -->
  <style>
    html, body { margin: 0; background-color: #12141C; }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #12141C;
      z-index: 2147483647;
      transition: opacity 0.35s ease;
    }
    #splash img { width: 128px; height: 128px; }
    #splash.hidden { opacity: 0; pointer-events: none; }
  </style>

  <!--
    Die Demo soll beim Neuladen immer den aktuellen Stand zeigen. Wir
    bauen ohne Service Worker (--pwa-strategy=none); dieses Skript meldet
    zusätzlich einen evtl. früher registrierten Service Worker ab und
    leert dessen Caches, damit kein alter Build mehr ausgeliefert wird.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if (self.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body>
  <div id="splash"><img src="icons/Icon-512.png" alt=""></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <!--
    Splash ausblenden, sobald Flutter sein erstes Frame gerendert hat
    (bzw. sein Ansicht-Element eingefügt wurde). Fallback-Timeout, falls das
    Signal ausbleibt.
  -->
  <script>
    (function () {
      var removed = false;
      function hideSplash() {
        if (removed) return;
        removed = true;
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('hidden');
        setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 400);
      }
      window.addEventListener('flutter-first-frame', hideSplash);
      // Zusätzlich beobachten, wann Flutter seine Ansicht in den DOM hängt.
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) {
          obs.disconnect();
          hideSplash();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      // Sicherheits-Fallback.
      setTimeout(hideSplash, 8000);
    })();
  </script>
</body>
</html>
